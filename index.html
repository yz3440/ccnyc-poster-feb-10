<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCNYC Feb 10 — Pier 57</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #111;
        font-family: system-ui, -apple-system, sans-serif;
        color: #999;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3rem;
        padding: 2rem;
      }

      h1 {
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #555;
      }

      .sketches {
        display: flex;
        gap: 2.5rem;
      }

      .sketches a {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        text-decoration: none;
        padding: 2rem;
        border: 1px solid #222;
        border-radius: 8px;
        transition: border-color 0.2s, background 0.2s;
        width: 240px;
      }

      .sketches a:hover {
        border-color: #444;
        background: #1a1a1a;
      }

      .sketch-icon {
        width: 80px;
        height: 140px;
        border-radius: 4px;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .sketch-icon svg {
        opacity: 0.5;
      }

      .sketches a:hover .sketch-icon svg {
        opacity: 0.8;
      }

      .sketch-label {
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #666;
        transition: color 0.2s;
      }

      .sketches a:hover .sketch-label {
        color: #fff;
      }

      .sketch-desc {
        font-size: 11px;
        color: #444;
        text-align: center;
        line-height: 1.5;
      }

      footer {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #333;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CCNYC &middot; Feb 10 2026 &middot; Pier 57</h1>

      <div class="sketches">
        <a href="/poster.html">
          <div class="sketch-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="4" y="4" width="16" height="16" rx="2" fill="#666"/>
              <rect x="24" y="4" width="16" height="16" rx="2" fill="#555"/>
              <rect x="4" y="24" width="16" height="16" rx="2" fill="#555"/>
              <rect x="24" y="24" width="16" height="16" rx="2" fill="#666"/>
            </svg>
          </div>
          <span class="sketch-label">Poster</span>
          <span class="sketch-desc">Ortho image grid with trail effect</span>
        </a>

        <a href="/text.html">
          <div class="sketch-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="8" y="12" width="32" height="4" rx="1" fill="#666"/>
              <rect x="12" y="20" width="24" height="4" rx="1" fill="#555"/>
              <rect x="10" y="28" width="28" height="4" rx="1" fill="#555"/>
              <rect x="14" y="36" width="20" height="4" rx="1" fill="#666"/>
            </svg>
          </div>
          <span class="sketch-label">Text</span>
          <span class="sketch-desc">SVG letter animation with CSS 3D</span>
        </a>
      </div>

      <footer>1080 &times; 1920 &middot; p5.js + CSS Transforms</footer>
    </main>
  </body>
</html>
